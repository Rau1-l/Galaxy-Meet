<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Meet | Ultimate Fixed</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #05070a; --accent: #3d85f4; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid var(--glass); z-index: 100; }
        .logo { font-weight: bold; color: var(--accent); font-size: 20px; }
        .main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        .video-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; background: #000; }
        .video-box { position: relative; background: #111; border-radius: 12px; border: 2px solid var(--glass); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 6px; font-size: 13px; z-index: 10; border: 1px solid var(--glass); }
        .side-menu { position: absolute; right: -320px; top: 0; width: 300px; height: 100%; background: #0d1117; border-left: 1px solid var(--glass); transition: 0.3s; z-index: 500; padding: 20px; box-sizing: border-box; }
        .side-menu.open { right: 0; }
        input, .btn { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; box-sizing: border-box; }
        input { background: #161b22; color: white; }
        .btn { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .chat-area { height: 150px; background: #0d1117; border-top: 1px solid var(--glass); display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .m { margin-bottom: 6px; padding: 6px 10px; border-radius: 8px; background: var(--glass); width: fit-content; max-width: 80%; }
        .m.me { background: var(--accent); margin-left: auto; }
        .toolbar { height: 80px; display: flex; justify-content: center; gap: 20px; background: #000; align-items: center; border-top: 1px solid var(--glass); }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #21262d; color: white; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .icon-btn.active { background: var(--accent); }
        .menu-trigger { position: fixed; right: 20px; top: 75px; z-index: 600; background: var(--accent); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px rgba(61, 133, 244, 0.5); }
    </style>
</head>
<body>

<header>
    <div class="logo">GALAXY MEET</div>
    <div onclick="copyId()" style="cursor:pointer; font-size:13px; background: var(--glass); padding: 5px 12px; border-radius: 8px;">ID: <span id="display-id" style="color:var(--accent)">...</span></div>
</header>

<button class="menu-trigger" onclick="toggleMenu()">⚙️</button>

<div class="main-container">
    <div class="video-grid">
        <div class="video-box" id="localBox">
            <video id="localVideo" muted autoplay playsinline></video>
            <div class="label" id="my-name-label">Вы</div>
        </div>
        <div class="video-box" id="remoteBox">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label" id="peer-name-label">Ожидание...</div>
        </div>
    </div>
    <div class="side-menu" id="sideMenu">
        <h3>Настройки</h3>
        <div id="vip-area">
            <small>Активация VIP:</small>
            <input type="password" id="vip-code" placeholder="Код..." oninput="checkVip()">
        </div>
        <div id="vip-ctrl" style="display:none">
            <small>Никнейм:</small>
            <input type="text" id="nick-in" placeholder="Ваш ник" oninput="save()">
            <small>Цвет ауры:</small>
            <input type="color" id="color-in" oninput="save()">
        </div>
        <hr style="border:0; border-top:1px solid #333; margin: 15px 0;">
        <input type="text" id="peer-id" placeholder="ID друга">
        <button class="btn" onclick="callFriend()">СОЕДИНИТЬСЯ</button>
        <button class="btn" style="background:#222; margin-top:10px" onclick="exportAcc()">🔑 Копировать ключ</button>
        <input type="text" id="import-in" placeholder="Вставить ключ..." oninput="importAcc()">
        <button class="btn" style="background:none; color:#ff4d4d; margin-top:10px" onclick="toggleMenu()">Закрыть</button>
    </div>
</div>

<div class="chat-area">
    <div id="messages"></div>
    <div style="display:flex; padding:10px; gap:10px; background:#000;">
        <input type="text" id="m-in" placeholder="Напишите..." style="margin:0" onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="btn" style="width:60px; margin:0" onclick="sendMsg()">></button>
    </div>
</div>

<div class="toolbar">
    <button class="icon-btn active" id="btn-audio" onclick="toggleMedia('audio')">🎤</button>
    <button class="icon-btn active" id="btn-video" onclick="toggleMedia('video')">📷</button>
    <button class="icon-btn" id="btn-screen" onclick="toggleScreen()">📺</button>
    <button class="icon-btn" onclick="location.reload()" style="background:#da3633">📞</button>
</div>

<script>
    const peer = new Peer();
    let myStream, screenStream, conn, call, syncInterval;
    let myData = { nick: "Гость", isVip: false, color: "#3d85f4" };

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }

    function checkVip() {
        if(document.getElementById('vip-code').value === "GALAXY_MEET_FOREVER_666777") {
            myData.isVip = true;
            document.getElementById('vip-ctrl').style.display = 'block';
            document.getElementById('vip-area').style.display = 'none';
            save();
        }
    }

    function save() {
        if(myData.isVip) {
            myData.nick = document.getElementById('nick-in').value || "Гость";
            myData.color = document.getElementById('color-in').value;
        }
        localStorage.setItem('galaxy_final_v10', JSON.stringify(myData));
        updateInterface();
        if(conn && conn.open) conn.send({type:'SYNC', d:myData});
    }

    function updateInterface() {
        document.getElementById('my-name-label').innerText = (myData.isVip ? "👑 " : "") + myData.nick;
        document.getElementById('localBox').style.borderColor = myData.isVip ? myData.color : "rgba(255,255,255,0.1)";
        if(myData.isVip) document.getElementById('localBox').style.boxShadow = `0 0 15px ${myData.color}44`;
    }

    navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
        myStream = s;
        document.getElementById('localVideo').srcObject = s;
    });

    peer.on('open', id => document.getElementById('display-id').innerText = id);

    function callFriend() {
        const id = document.getElementById('peer-id').value;
        if(!id) return;
        conn = peer.connect(id);
        setupConn(conn);
        const callObj = peer.call(id, myStream);
        setupCall(callObj);
        toggleMenu();
    }

    peer.on('connection', c => { conn = c; setupConn(c); });
    peer.on('call', c => { c.answer(myStream); setupCall(c); });

    function setupConn(c) {
        c.on('open', () => {
            if(syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(() => {
                c.send({type:'SYNC', d:myData});
            }, 800);
        });
        c.on('data', data => {
            if(data.type === 'SYNC') {
                document.getElementById('peer-name-label').innerText = (data.d.isVip ? "👑 " : "") + data.d.nick;
                document.getElementById('remoteBox').style.borderColor = data.d.isVip ? data.d.color : "rgba(255,255,255,0.1)";
                if(data.d.isVip) document.getElementById('remoteBox').style.boxShadow = `0 0 15px ${data.d.color}44`;
                c.send({type:'ACK'});
            }
            if(data.type === 'ACK') clearInterval(syncInterval);
            if(data.type === 'MSG') renderMsg(data.n, data.t, false);
        });
    }

    function setupCall(c) {
        call = c;
        c.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
    }

    function toggleMedia(type) {
        const track = type === 'audio' ? myStream.getAudioTracks()[0] : myStream.getVideoTracks()[0];
        track.enabled = !track.enabled;
        document.getElementById('btn-' + type).classList.toggle('active');
    }

    async function toggleScreen() {
        if(!screenStream) {
            screenStream = await navigator.mediaDevices.getDisplayMedia({video:true});
            replaceVideoTrack(screenStream.getVideoTracks()[0]);
            document.getElementById('localVideo').srcObject = screenStream;
            document.getElementById('btn-screen').classList.add('active');
            screenStream.getVideoTracks()[0].onended = () => toggleScreen();
        } else {
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
            replaceVideoTrack(myStream.getVideoTracks()[0]);
            document.getElementById('localVideo').srcObject = myStream;
            document.getElementById('btn-screen').classList.remove('active');
        }
    }

    function replaceVideoTrack(track) {
        if(call && call.peerConnection) {
            const sender = call.peerConnection.getSenders().find(s => s.track.kind === 'video');
            if(sender) sender.replaceTrack(track);
        }
    }

    function sendMsg() {
        const t = document.getElementById('m-in').value;
        if(t && conn && conn.open) {
            conn.send({type:'MSG', t:t, n:myData.nick});
            renderMsg("Вы", t, true);
            document.getElementById('m-in').value = "";
        }
    }

    function renderMsg(n, t, me) {
        const d = document.createElement('div');
        d.className = `m ${me?'me':''}`;
        d.innerHTML = `<b>${n}:</b> ${t}`;
        document.getElementById('messages').appendChild(d);
        document.getElementById('messages').scrollTop = 9999;
    }

    function exportAcc() { navigator.clipboard.writeText(btoa(JSON.stringify(myData))); alert("Ключ скопирован!"); }
    function importAcc() { try { myData = JSON.parse(atob(document.getElementById('import-in').value)); localStorage.setItem('galaxy_final_v10', JSON.stringify(myData)); location.reload(); } catch(e){} }
    function copyId() { navigator.clipboard.writeText(document.getElementById('display-id').innerText); alert("ID скопирован!"); }
    
    // Автозагрузка
    const saved = localStorage.getItem('galaxy_final_v10');
    if(saved) {
        myData = JSON.parse(saved);
        if(myData.isVip) {
            document.getElementById('vip-ctrl').style.display = 'block';
            document.getElementById('vip-area').style.display = 'none';
            document.getElementById('nick-in').value = myData.nick;
            document.getElementById('color-in').value = myData.color;
            updateInterface();
        }
    }
</script>
</body>
</html>
