<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Meet | Private Edition</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #05070a; --accent: #3d85f4; --vip-gold: #ffd700; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid var(--glass); z-index: 100; }
        .logo { font-weight: bold; color: var(--accent); }

        .main-layout { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        .viewport { flex: 3; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #000; }
        .video-wrapper { position: relative; background: #111; border-radius: 12px; overflow: hidden; border: 2px solid var(--glass); display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .side-panel { 
            position: absolute; left: 20px; top: 80px; width: 280px; 
            background: #161b22; border-radius: 12px; border: 1px solid var(--glass); 
            z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .panel-header { padding: 10px; background: #21262d; border-radius: 12px 12px 0 0; cursor: move; font-size: 11px; text-align: center; color: #8b949e; }
        .panel-content { padding: 15px; }

        .vip-locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); transition: 0.3s; }
        .vip-unlocked { opacity: 1 !important; pointer-events: all !important; filter: grayscale(0) !important; }

        .chat-panel { flex: 1; background: #0d1117; border-left: 1px solid var(--glass); display: flex; flex-direction: column; min-width: 300px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: var(--glass); padding: 8px 12px; border-radius: 12px; font-size: 14px; max-width: 85%; }
        .msg.me { align-self: flex-end; background: var(--accent); }

        input, .btn-action { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; box-sizing: border-box; }
        input { background: #0d1117; color: white; }
        .btn-action { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .controls { height: 80px; display: flex; justify-content: center; align-items: center; gap: 15px; background: #000; border-top: 1px solid var(--glass); }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; background: #21262d; color: white; }
        .circle-btn.active { background: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo">GALAXY MEET</div>
    <div style="display: flex; gap: 10px;">
        <button onclick="exportAccount()" style="background:none; border:1px solid #333; color:#666; font-size:10px; cursor:pointer;">🔑 КЛЮЧ</button>
        <div onclick="copyId()" style="cursor:pointer; font-size: 12px; padding: 5px; background: var(--glass);">ID: <span id="my-id-display">...</span></div>
    </div>
</header>

<div class="main-layout">
    <div class="side-panel" id="draggablePanel">
        <div class="panel-header" id="dragHandle">МЕНЮ (Кнопка 1 для сброса)</div>
        <div class="panel-content">
            <div id="activation-area">
                <small>Введи код для доступа к VIP:</small>
                <input type="password" id="vip-key" placeholder="Код активации..." oninput="checkVip()">
            </div>

            <div id="vip-features" class="vip-locked">
                <div id="vip-label" style="text-align:center; color:gold; font-size:12px; margin-bottom:5px;"></div>
                <small>Никнейм:</small>
                <input type="text" id="nick-input" placeholder="Ваш ник" oninput="saveData()">
                <small>Цвет ауры:</small>
                <input type="color" id="aura-color" style="height:35px" oninput="saveData()">
            </div>

            <hr style="border-color:#333; margin:10px 0;">
            <small>Вход по ключу:</small>
            <input type="text" id="account-key-input" placeholder="Вставь ключ аккаунта..." oninput="importAccount()">
            
            <input type="text" id="target-id" placeholder="ID друга">
            <button class="btn-action" onclick="connectToPeer()">СОЕДИНИТЬСЯ</button>
        </div>
    </div>

    <div class="viewport">
        <div class="video-wrapper" id="local-ui">
            <video id="localVideo" muted autoplay playsinline></video>
            <div style="position:absolute; bottom:10px; left:10px; font-size:12px; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:4px;">
                <span id="my-name-label">Вы</span>
            </div>
        </div>
        <div class="video-wrapper" id="remote-ui">
            <video id="remoteVideo" autoplay playsinline></video>
            <div style="position:absolute; bottom:10px; left:10px; font-size:12px; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:4px;">
                <span id="remote-name-label">Ожидание...</span>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <div id="chat-messages"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendChatMsg()">
            <button class="btn-action" style="width:50px" onclick="sendChatMsg()">></button>
        </div>
    </div>
</div>

<div class="controls">
    <button class="circle-btn active" onclick="toggleMedia('audio', this)">🎤</button>
    <button class="circle-btn active" onclick="toggleMedia('video', this)">📷</button>
    <button class="circle-btn" onclick="handleScreenShare()" id="screenBtn">📺</button>
    <button class="circle-btn" style="background:#da3633" onclick="location.reload()">📞</button>
</div>

<script>
    const peer = new Peer();
    const pnl = document.getElementById('draggablePanel');
    const hndl = document.getElementById('dragHandle');
    let myStream, screenStream, currentConn, currentCall;
    let myData = { nick: "Гость", isVip: false, color: "#3d85f4" };

    // 1. ПРОВЕРКА VIP
    function checkVip() {
        if(document.getElementById('vip-key').value === "GALAXY_MEET_FOREVER_666777") {
            myData.isVip = true;
            unlockVipUI();
            saveData();
        }
    }

    function unlockVipUI() {
        document.getElementById('vip-features').classList.add('vip-unlocked');
        document.getElementById('activation-area').style.display = 'none';
        document.getElementById('vip-label').innerText = "👑 GALAXY VIP АКТИВИРОВАН";
    }

    function saveData() {
        if(myData.isVip) {
            myData.nick = document.getElementById('nick-input').value || "Гость";
            myData.color = document.getElementById('aura-color').value;
        }
        localStorage.setItem('galaxy_final_save', JSON.stringify(myData));
        updateInterface();
        if(currentConn) currentConn.send({type: 'PROFILE', data: myData});
    }

    function updateInterface() {
        document.getElementById('my-name-label').innerText = (myData.isVip ? "👑 " : "") + myData.nick;
        document.getElementById('local-ui').style.borderColor = myData.isVip ? myData.color : "rgba(255,255,255,0.1)";
        if(myData.isVip) document.getElementById('local-ui').style.boxShadow = `0 0 15px ${myData.color}55`;
    }

    // 2. ЗАГРУЗКА ПРИ СТАРТЕ
    function init() {
        const saved = localStorage.getItem('galaxy_final_save');
        if(saved) {
            myData = JSON.parse(saved);
            if(myData.isVip) {
                unlockVipUI();
                document.getElementById('nick-input').value = myData.nick;
                document.getElementById('aura-color').value = myData.color;
                updateInterface();
            }
        }
    }

    // 3. ПЕРЕНОС АККАУНТА
    function exportAccount() {
        const key = btoa(JSON.stringify(myData));
        navigator.clipboard.writeText(key);
        alert("Твой ключ скопирован! Вставь его на другом компе.");
    }

    function importAccount() {
        try {
            const key = document.getElementById('account-key-input').value;
            const decoded = JSON.parse(atob(key));
            myData = decoded;
            localStorage.setItem('galaxy_final_save', JSON.stringify(myData));
            location.reload();
        } catch(e) {}
    }

    // 4. ГОРЯЧАЯ КЛАВИША 1
    document.addEventListener('keydown', (e) => {
        if(e.key === '1' && e.target.tagName !== 'INPUT') {
            pnl.style.top = "80px"; pnl.style.left = "20px";
        }
    });

    // 5. ДРАГ-ЭНД-ДРОП
    hndl.onmousedown = (e) => {
        let nx = e.clientX, ny = e.clientY;
        document.onmousemove = (ev) => {
            let x = nx - ev.clientX, y = ny - ev.clientY;
            nx = ev.clientX; ny = ev.clientY;
            pnl.style.top = (pnl.offsetTop - y) + "px";
            pnl.style.left = (pnl.offsetLeft - x) + "px";
        };
        document.onmouseup = () => document.onmousemove = null;
    };

    // 6. СВЯЗЬ И ВИДЕО
    navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
        myStream = s;
        document.getElementById('localVideo').srcObject = s;
    });

    peer.on('open', id => document.getElementById('my-id-display').innerText = id);

    function connectToPeer() {
        const id = document.getElementById('target-id').value;
        currentCall = peer.call(id, myStream);
        currentCall.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
        currentConn = peer.connect(id);
        currentConn.on('open', () => {
            currentConn.send({type: 'PROFILE', data: myData});
            listen(currentConn);
        });
    }

    peer.on('call', call => {
        currentCall = call;
        call.answer(myStream);
        call.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
    });

    peer.on('connection', conn => {
        currentConn = conn;
        listen(conn);
    });

    function listen(conn) {
        conn.on('data', p => {
            if(p.type === 'PROFILE') {
                document.getElementById('remote-name-label').innerText = (p.data.isVip ? "👑 " : "") + p.data.nick;
                document.getElementById('remote-ui').style.borderColor = p.data.isVip ? p.data.color : "rgba(255,255,255,0.1)";
            }
            if(p.type === 'CHAT') renderMsg(p.nick, p.text, false);
        });
    }

    async function handleScreenShare() {
        if (!screenStream) {
            screenStream = await navigator.mediaDevices.getDisplayMedia({video: true});
            replaceTrack(screenStream.getVideoTracks()[0]);
            document.getElementById('localVideo').srcObject = screenStream;
            screenStream.getVideoTracks()[0].onended = () => handleScreenShare();
        } else {
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
            replaceTrack(myStream.getVideoTracks()[0]);
            document.getElementById('localVideo').srcObject = myStream;
        }
    }

    function replaceTrack(newTrack) {
        if(currentCall) {
            const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
            if(sender) sender.replaceTrack(newTrack);
        }
    }

    function sendChatMsg() {
        const txt = document.getElementById('chat-input').value;
        if(!txt) return;
        if(currentConn) currentConn.send({type: 'CHAT', text: txt, nick: myData.nick});
        renderMsg("Вы", txt, true);
        document.getElementById('chat-input').value = "";
    }

    function renderMsg(nick, text, isMe) {
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : ''}`;
        div.innerHTML = `<b>${nick}</b>${text}`;
        const box = document.getElementById('chat-messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function toggleMedia(type, b) {
        const track = type === 'video' ? myStream.getVideoTracks()[0] : myStream.getAudioTracks()[0];
        track.enabled = !track.enabled;
        b.classList.toggle('active');
    }

    function copyId() {
        navigator.clipboard.writeText(document.getElementById('my-id-display').innerText);
        alert("ID скопирован!");
    }

    init();
</script>
</body>
</html>
