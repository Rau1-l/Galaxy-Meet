<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Meet | Final Fixed</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #05070a; --accent: #3d85f4; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 50px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid var(--glass); }
        .main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        .video-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #000; }
        .video-box { position: relative; background: #111; border-radius: 12px; border: 2px solid var(--glass); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 6px; font-size: 12px; z-index: 10; border: 1px solid var(--glass); }
        .side-menu { position: absolute; right: -320px; top: 0; width: 300px; height: 100%; background: #0d1117; border-left: 1px solid var(--glass); transition: 0.3s; z-index: 500; padding: 20px; box-sizing: border-box; }
        .side-menu.open { right: 0; }
        input, .btn { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; box-sizing: border-box; }
        input { background: #161b22; color: white; }
        .btn { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .chat-area { height: 120px; background: #0d1117; border-top: 1px solid var(--glass); display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
        .m { margin-bottom: 4px; padding: 4px 8px; border-radius: 6px; background: var(--glass); width: fit-content; }
        .toolbar { height: 60px; display: flex; justify-content: center; gap: 15px; background: #000; align-items: center; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #21262d; color: white; cursor: pointer; }
        .menu-trigger { position: fixed; right: 20px; top: 60px; z-index: 600; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; }
        #inst-box { display: none; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; font-size: 11px; border: 1px dashed #444; margin: 10px 0; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--accent); font-weight:bold;">GALAXY MEET</div>
    <div onclick="copyId()" style="cursor:pointer; font-size:12px;">ID: <span id="display-id">...</span></div>
</header>

<button class="menu-trigger" onclick="toggleMenu()">⚙️</button>

<div class="main-container">
    <div class="video-grid">
        <div class="video-box" id="localBox"><video id="localVideo" muted autoplay playsinline></video><div class="label" id="my-name">Вы</div></div>
        <div class="video-box" id="remoteBox"><video id="remoteVideo" autoplay playsinline></video><div class="label" id="peer-name">Ожидание...</div></div>
    </div>
    <div class="side-menu" id="sideMenu">
        <button class="btn" style="background:#444" onclick="toggleInst()">Инструкция</button>
        <div id="inst-box"><b>🔑 Ключ:</b> Сохрани его кнопкой ниже для переноса VIP.<br><b>1:</b> Сброс меню (на ПК).</div>
        <div id="vip-area"><input type="password" id="vip-code" placeholder="VIP Код..." oninput="checkVip()"></div>
        <div id="vip-ctrl" style="display:none">
            <input type="text" id="nick-in" placeholder="Ник" oninput="save()">
            <input type="color" id="color-in" oninput="save()">
        </div>
        <hr style="border:0; border-top:1px solid #333">
        <input type="text" id="peer-id" placeholder="ID друга">
        <button class="btn" onclick="callFriend()">СОЕДИНИТЬСЯ</button>
        <button class="btn" style="background:#222" onclick="exportAcc()">🔑 Копировать ключ</button>
        <input type="text" id="import-in" placeholder="Вставить ключ..." oninput="importAcc()">
    </div>
</div>

<div class="chat-area"><div id="messages"></div><div style="display:flex; padding:5px;"><input type="text" id="m-in" style="margin:0"><button onclick="sendMsg()" style="width:40px">></button></div></div>

<div class="toolbar">
    <button class="icon-btn" onclick="mute('audio')">🎤</button>
    <button class="icon-btn" onclick="mute('video')">📷</button>
    <button class="icon-btn" onclick="location.reload()" style="background:red">📞</button>
</div>

<script>
    const peer = new Peer();
    let myStream, conn, syncInterval;
    let myData = { nick: "Гость", isVip: false, color: "#3d85f4" };

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }
    function toggleInst() { const b = document.getElementById('inst-box'); b.style.display = b.style.display === 'block' ? 'none' : 'block'; }

    function checkVip() {
        if(document.getElementById('vip-code').value === "GALAXY_MEET_FOREVER_666777") {
            myData.isVip = true;
            document.getElementById('vip-ctrl').style.display = 'block';
            document.getElementById('vip-area').style.display = 'none';
            save();
        }
    }

    function save() {
        if(myData.isVip) {
            myData.nick = document.getElementById('nick-in').value || "Гость";
            myData.color = document.getElementById('color-in').value;
        }
        localStorage.setItem('galaxy_vfinal', JSON.stringify(myData));
        document.getElementById('my-name').innerText = (myData.isVip ? "👑 " : "") + myData.nick;
        document.getElementById('localBox').style.borderColor = myData.isVip ? myData.color : "#333";
    }

    navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
        myStream = s; document.getElementById('localVideo').srcObject = s;
    });

    peer.on('open', id => document.getElementById('display-id').innerText = id);

    function callFriend() {
        const id = document.getElementById('peer-id').value;
        if(!id) return;
        conn = peer.connect(id);
        setupConn(conn);
        peer.call(id, myStream).on('stream', s => document.getElementById('remoteVideo').srcObject = s);
        toggleMenu();
    }

    peer.on('connection', c => { conn = c; setupConn(c); });
    peer.on('call', c => { c.answer(myStream); c.on('stream', s => document.getElementById('remoteVideo').srcObject = s); });

    function setupConn(c) {
        c.on('open', () => {
            // Запускаем настойчивую отправку ника каждые 500мс
            if(syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(() => {
                c.send({type:'SYNC', d:myData});
            }, 500);
        });
        c.on('data', data => {
            if(data.type === 'SYNC') {
                document.getElementById('peer-name').innerText = (data.d.isVip ? "👑 " : "") + data.d.nick;
                document.getElementById('remoteBox').style.borderColor = data.d.isVip ? data.d.color : "#333";
                // Шлем ответ, что получили данные, чтобы остановить интервал
                c.send({type:'ACK'});
            }
            if(data.type === 'ACK') { clearInterval(syncInterval); }
            if(data.type === 'MSG') renderMsg(data.n, data.t);
        });
    }

    function sendMsg() {
        const t = document.getElementById('m-in').value;
        if(t && conn) { conn.send({type:'MSG', t:t, n:myData.nick}); renderMsg("Вы", t); document.getElementById('m-in').value = ""; }
    }

    function renderMsg(n, t) {
        const d = document.createElement('div'); d.className = 'm'; d.innerHTML = `<b>${n}:</b> ${t}`;
        document.getElementById('messages').appendChild(d);
        document.getElementById('messages').scrollTop = 9999;
    }

    function exportAcc() { navigator.clipboard.writeText(btoa(JSON.stringify(myData))); alert("Ключ скопирован!"); }
    function importAcc() { try { myData = JSON.parse(atob(document.getElementById('import-in').value)); localStorage.setItem('galaxy_vfinal', JSON.stringify(myData)); location.reload(); } catch(e){} }
    function copyId() { navigator.clipboard.writeText(document.getElementById('display-id').innerText); alert("ID скопирован!"); }
    
    // Загрузка
    const s = localStorage.getItem('galaxy_vfinal');
    if(s) {
        myData = JSON.parse(s);
        if(myData.isVip) {
            document.getElementById('vip-ctrl').style.display = 'block';
            document.getElementById('vip-area').style.display = 'none';
            document.getElementById('nick-in').value = myData.nick;
            document.getElementById('color-in').value = myData.color;
            save();
        }
    }
</script>
</body>
</html>
