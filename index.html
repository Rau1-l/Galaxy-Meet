<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Meet | Instant VIP</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #05070a; --accent: #3d85f4; --vip-gold: #ffd700; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid var(--glass); z-index: 100; }
        .logo { font-weight: bold; color: var(--accent); font-size: 20px; }

        .main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        .video-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #000; }
        .video-box { position: relative; background: #111; border-radius: 12px; border: 2px solid var(--glass); display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.3s; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 6px; font-size: 12px; border: 1px solid var(--glass); z-index: 10; }

        .side-menu { position: absolute; right: -320px; top: 0; width: 300px; height: 100%; background: #0d1117; border-left: 1px solid var(--glass); transition: 0.3s; z-index: 500; padding: 20px; box-sizing: border-box; }
        .side-menu.open { right: 0; }

        #inst-box { display: none; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; font-size: 11px; margin: 10px 0; border: 1px dashed #444; }
        .locked { opacity: 0.4; pointer-events: none; }
        
        input { width: 100%; padding: 10px; margin: 5px 0; background: #161b22; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }

        .chat-area { height: 150px; background: #0d1117; border-top: 1px solid var(--glass); display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .m { margin-bottom: 5px; padding: 5px 10px; border-radius: 8px; background: var(--glass); width: fit-content; }
        .m.me { background: var(--accent); margin-left: auto; }

        .toolbar { height: 70px; display: flex; justify-content: center; align-items: center; gap: 15px; background: #000; border-top: 1px solid var(--glass); }
        .icon-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; background: #21262d; color: white; font-size: 18px; }
        .icon-btn.active { background: var(--accent); }
        .menu-trigger { position: fixed; right: 20px; top: 70px; z-index: 600; background: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo">GALAXY MEET</div>
    <div onclick="copyId()" style="cursor:pointer; background: var(--glass); padding: 5px 12px; border-radius: 8px; font-family: monospace;">
        ID: <span id="display-id">...</span>
    </div>
</header>

<button class="icon-btn menu-trigger" onclick="toggleMenu()">⚙️</button>

<div class="main-container">
    <div class="video-grid">
        <div class="video-box" id="localBox">
            <video id="localVideo" muted autoplay playsinline></video>
            <div class="label" id="my-name-display">Вы</div>
        </div>
        <div class="video-box" id="remoteBox">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label" id="peer-name-display">Ожидание...</div>
        </div>
    </div>

    <div class="side-menu" id="sideMenu">
        <h3>Настройки</h3>
        <button class="btn" style="background:#444" onclick="toggleInst()">Инструкция</button>
        <div id="inst-box">
            <b>🔑 Ключ:</b> Сохрани его, чтобы зайти под своим VIP-аккаунтом с любого ПК.<br>
            <b>⚙️ Ожидание:</b> Если ник не виден, нажми «Соединиться» еще раз.
        </div>

        <div id="vip-unlock-area">
            <small>Активация VIP:</small>
            <input type="password" id="vip-code" placeholder="Код..." oninput="activateVip()">
        </div>

        <div id="vip-controls" class="locked">
            <small>Никнейм:</small>
            <input type="text" id="nick-in" placeholder="Ваш ник" oninput="applyChanges()">
            <small>Цвет ауры:</small>
            <input type="color" id="color-in" oninput="applyChanges()">
        </div>

        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
        <input type="text" id="import-in" placeholder="Вставить ключ..." oninput="importAcc()">
        <button class="btn" style="background:#222" onclick="exportAcc()">🔑 Скопировать мой ключ</button>
        
        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
        <input type="text" id="peer-id-in" placeholder="ID друга">
        <button class="btn" onclick="makeCall()">СОЕДИНИТЬСЯ</button>
        <button class="btn" style="background:none; color:red" onclick="toggleMenu()">Закрыть</button>
    </div>
</div>

<div class="chat-area">
    <div id="messages"></div>
    <div style="padding:5px; display:flex; gap:5px;">
        <input type="text" id="msg-in" placeholder="Сообщение..." style="margin:0" onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="btn" style="width:60px; margin:0" onclick="sendMsg()">></button>
    </div>
</div>

<div class="toolbar">
    <button class="icon-btn active" onclick="mute('audio', this)">🎤</button>
    <button class="icon-btn active" onclick="mute('video', this)">📷</button>
    <button class="icon-btn" onclick="shareScreen()">📺</button>
    <button class="icon-btn" style="background:red" onclick="location.reload()">📞</button>
</div>

<script>
    const peer = new Peer();
    let myStream, conn, call;
    let myData = { nick: "Гость", isVip: false, color: "#3d85f4" };

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }
    function toggleInst() { const b = document.getElementById('inst-box'); b.style.display = b.style.display === 'block' ? 'none' : 'block'; }

    // --- VIP ЛОГИКА ---
    function activateVip() {
        if(document.getElementById('vip-code').value === "GALAXY_MEET_FOREVER_666777") {
            myData.isVip = true;
            document.getElementById('vip-controls').classList.remove('locked');
            document.getElementById('vip-unlock-area').style.display = 'none';
            applyChanges();
        }
    }

    function applyChanges() {
        if(myData.isVip) {
            myData.nick = document.getElementById('nick-in').value || "Гость";
            myData.color = document.getElementById('color-in').value;
        }
        localStorage.setItem('galaxy_v5', JSON.stringify(myData));
        document.getElementById('my-name-display').innerText = (myData.isVip ? "👑 " : "") + myData.nick;
        document.getElementById('localBox').style.borderColor = myData.isVip ? myData.color : "rgba(255,255,255,0.1)";
        if(conn && conn.open) conn.send({type:'SYNC', data: myData});
    }

    function exportAcc() {
        navigator.clipboard.writeText(btoa(JSON.stringify(myData)));
        alert("Ключ скопирован!");
    }

    function importAcc() {
        try {
            myData = JSON.parse(atob(document.getElementById('import-in').value));
            localStorage.setItem('galaxy_v5', JSON.stringify(myData));
            location.reload();
        } catch(e) {}
    }

    // --- СВЯЗЬ ---
    navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
        myStream = s;
        document.getElementById('localVideo').srcObject = s;
    });

    peer.on('open', id => document.getElementById('display-id').innerText = id);

    function makeCall() {
        const id = document.getElementById('peer-id-in').value;
        if(!id) return;
        conn = peer.connect(id);
        setupConn(conn);
        call = peer.call(id, myStream);
        setupCall(call);
        toggleMenu();
    }

    peer.on('connection', c => { conn = c; setupConn(c); });
    peer.on('call', c => { call = c; c.answer(myStream); setupCall(c); });

    function setupConn(c) {
        c.on('open', () => {
            // Мгновенная отправка при открытии канала
            c.send({type:'SYNC', data: myData});
        });
        c.on('data', d => {
            if(d.type === 'SYNC') {
                document.getElementById('peer-name-display').innerText = (d.data.isVip ? "👑 " : "") + d.data.nick;
                document.getElementById('remoteBox').style.borderColor = d.data.isVip ? d.data.color : "rgba(255,255,255,0.1)";
                if(d.data.isVip) document.getElementById('remoteBox').style.boxShadow = `0 0 15px ${d.data.color}66`;
            }
            if(d.type === 'MSG') renderMsg(d.n, d.t, false);
        });
    }

    function setupCall(c) {
        c.on('stream', s => {
            document.getElementById('remoteVideo').srcObject = s;
            // Повторная отправка ника, когда пошло видео (на всякий случай)
            if(conn && conn.open) conn.send({type:'SYNC', data: myData});
        });
    }

    function sendMsg() {
        const t = document.getElementById('msg-in').value;
        if(!t || !conn) return;
        conn.send({type:'MSG', t:t, n:myData.nick});
        renderMsg("Вы", t, true);
        document.getElementById('msg-in').value = "";
    }

    function renderMsg(n, t, me) {
        const d = document.createElement('div');
        d.className = `m ${me?'me':''}`;
        d.innerHTML = `<b>${n}:</b> ${t}`;
        document.getElementById('messages').appendChild(d);
        document.getElementById('messages').scrollTop = 99999;
    }

    function mute(type, btn) {
        const track = type === 'video' ? myStream.getVideoTracks()[0] : myStream.getAudioTracks()[0];
        track.enabled = !track.enabled;
        btn.classList.toggle('active');
    }

    async function shareScreen() {
        const s = await navigator.mediaDevices.getDisplayMedia({video:true});
        document.getElementById('localVideo').srcObject = s;
        if(call) {
            const sender = call.peerConnection.getSenders().find(x => x.track.kind === 'video');
            sender.replaceTrack(s.getVideoTracks()[0]);
        }
    }

    function copyId() {
        navigator.clipboard.writeText(document.getElementById('display-id').innerText);
        alert("ID скопирован!");
    }

    // Загрузка
    const s = localStorage.getItem('galaxy_v5');
    if(s) {
        myData = JSON.parse(s);
        if(myData.isVip) {
            document.getElementById('vip-controls').classList.remove('locked');
            document.getElementById('vip-unlock-area').style.display = 'none';
            document.getElementById('nick-in').value = myData.nick;
            document.getElementById('color-in').value = myData.color;
            applyChanges();
        }
    }
</script>
</body>
</html>
